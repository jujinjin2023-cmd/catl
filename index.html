<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>站务月检月考</title>
<style>
:root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --warn: #f59e0b; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --text-light: #6b7280; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
.container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
h1 { text-align: center; color: var(--text); margin-bottom: 5px; }
.subtitle { text-align: center; color: var(--text-light); margin-bottom: 25px; font-size: 14px; }
.info-section { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
.info-section label { font-weight: 600; display: block; margin-bottom: 5px; }
.info-section input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
.info-section input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.q-block { padding: 15px; margin-bottom: 20px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; }
.q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.q-type { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.q-text { font-weight: 600; font-size: 15px; }
.options label { display: flex; align-items: flex-start; padding: 8px 10px; margin: 6px 0; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
.options label:hover { background: #eef2ff; }
.options input { margin-right: 10px; margin-top: 4px; }
.btn-group { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
button { padding: 12px 28px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
.btn-submit { background: var(--success); color: white; }
.btn-submit:hover { background: #15803d; }
.btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }
.btn-admin { background: var(--warn); color: white; display: none; margin: 15px auto 0; }
.btn-admin:hover { background: #d97706; }
.result-box { margin-top: 25px; padding: 20px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; display: none; animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.opt-correct { background: #dcfce7 !important; border-left: 3px solid var(--success); }
.opt-wrong { background: #fee2e2 !important; border-left: 3px solid var(--danger); }
.q-result { font-size: 13px; margin-top: 8px; color: var(--text-light); }
.q-result span { color: var(--success); font-weight: bold; }
#statusMsg { display: none; text-align: center; padding: 40px 20px; background: #f8fafc; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
#statusMsg h2 { color: var(--danger); margin: 0 0 10px; }
#statusMsg p { color: var(--text-light); margin: 5px 0; }
#historyScore { font-size: 18px; font-weight: bold; margin-top: 15px !important; }
</style>
</head>
<body>
<div class="container">
    <h1>站务月检月考</h1>

let currentQuestions = [];
let isSubmitting = false;
let isSubmitted = false;
const STORAGE_KEY = 'station_exam_v1_lock';

function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function checkDeviceStatus() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (data && data.completed) {
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('statusMsg').style.display = 'block';
        document.getElementById('adminResetBtn').style.display = 'inline-block';
        document.getElementById('historyScore').innerHTML = '考生：' + (data.name || '未知') + ' | 历史得分：<span style="color:#166534;">' + data.score + '/100</span>';
        document.getElementById('lockTitle').textContent = data.method === '自动' ? '🚨 切屏已自动交卷' : '⛔ 考试机会已使用';
        document.getElementById('lockDesc').textContent = '试卷已锁定。如需重新考试，请由管理员输入密码解锁。';
        return true;
    }
    return false;
}

function initQuiz() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '提交试卷';
    document.getElementById('userName').value = '';

    const picked = shuffle(rawBank).slice(0, 25);
    currentQuestions = picked.map((q, index) => ({
        ...q,
        index: index + 1,
        shuffledOpts: shuffle(q.opts),
        inputType: q.type === 'single' ? 'radio' : 'checkbox'
    }));

    const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
    currentQuestions.forEach(q => {
        const block = document.createElement('div');
        block.className = 'q-block';
        let optionsHtml = '';
        q.shuffledOpts.forEach((opt, i) => {
            optionsHtml += '<label id="lbl-' + q.id + '-' + i + '"><input type="' + q.inputType + '" name="q' + q.id + '" value="' + opt + '"><span>' + letters[i] + '. ' + opt + '</span></label>';
        });
        block.innerHTML = '<div class="q-header"><span class="q-type">' + (q.type === 'single' ? '单选题' : '多选题') + '</span><span class="q-text">' + q.index + '. ' + q.q + '</span></div><div class="options">' + optionsHtml + '</div><div class="q-result" id="res-' + q.id + '"></div>';
        container.appendChild(block);
    });
}

function setupAntiCheat() {
    const triggerAutoSubmit = () => {
        if (!isSubmitted && !isSubmitting) {
            console.log('⚠️ 检测到切屏或后台切换，触发自动交卷');
            submitQuiz(true);
        }
    };
    document.addEventListener('visibilitychange', () => { if (document.hidden) triggerAutoSubmit(); });
    window.addEventListener('pagehide', triggerAutoSubmit);
}

function adminUnlock() {
    const pwd = prompt('🔐 请输入管理员密码以解锁重考：');
    if (pwd === ADMIN_PASSWORD) {
        localStorage.removeItem(STORAGE_KEY);
        isSubmitted = false;
        isSubmitting = false;
        document.getElementById('adminResetBtn').style.display = 'none';
        document.getElementById('statusMsg').style.display = 'none';
        document.getElementById('quizArea').style.display = 'block';
        initQuiz();
        alert('✅ 密码验证成功，已清除本地锁定并重新生成试卷！');
    } else if (pwd !== null) {
        alert('❌ 密码错误，权限拒绝！');
    }
}

async function submitQuiz(isAuto = false) {
    if (isSubmitted || isSubmitting) return;
    isSubmitting = true;

    const nameInput = document.getElementById('userName');
    let name = nameInput.value.trim();
    if (!name) name = isAuto ? '未填写(切屏自动提交)' : '未填写';

    if (!isAuto) {
        if (!confirm('确定提交试卷吗？提交后将无法修改。')) {
            isSubmitting = false;
            return;
        }
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = isAuto ? '切屏自动提交中...' : '提交中...';

    let score = 0;
    const wrongDetails = [];
    const resultBox = document.getElementById('resultBox');

    currentQuestions.forEach(q => {
        const inputs = document.querySelectorAll('input[name="q' + q.id + '"]:checked');
        const userAns = Array.from(inputs).map(i => i.value).sort();
        const correctAns = [...q.ans].sort();
        const isCorrect = JSON.stringify(userAns) === JSON.stringify(correctAns);

        if (isCorrect) score += 4;
        else wrongDetails.push('第' + q.index + '题：' + q.q.substring(0,20) + '... (你的答案: ' + (userAns.join('、') || '未答') + ')');

        const resDiv = document.getElementById('res-' + q.id);
        resDiv.innerHTML = isCorrect 
            ? '<span style="color:#166534;font-weight:bold;">✔ 回答正确 (+4分)</span>'
            : '<span style="color:#dc2626;font-weight:bold;">✖ 回答错误</span> | 正确答案：<span style="color:#166534;font-weight:bold;">' + q.ans.join('、') + '</span>';

        q.shuffledOpts.forEach((opt, i) => {
            const lbl = document.getElementById('lbl-' + q.id + '-' + i);
            const isChecked = userAns.includes(opt);
            const isActuallyCorrect = q.ans.includes(opt);
            if (isActuallyCorrect) lbl.classList.add('opt-correct');
            if (isChecked && !isActuallyCorrect) lbl.classList.add('opt-wrong');
            lbl.querySelector('input').disabled = true;
        });
    });

    const record = { completed: true, name: name, score: score, time: new Date().toLocaleString('zh-CN'), method: isAuto ? '自动' : '手动' };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(record));

    try {
        const payload = {
            姓名: name,
            得分: score + '/100',
            提交时间: record.time,
            提交方式: record.method,
            错题记录: wrongDetails.length ? wrongDetails.join(' | ') : '全部正确'
        };

        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain' }
        });
    } catch (err) {
        console.warn('⚠️ 云端成绩同步失败，但本地考试已锁定');
    }

    isSubmitted = true;
    resultBox.style.display = 'block';
    resultBox.style.background = isAuto ? '#fef3c7' : '#dcfce7';
    resultBox.style.color = isAuto ? '#92400e' : '#166534';
    const tip = isAuto ? '🚨 检测到切屏，已自动交卷' : '✅ 提交成功';
    resultBox.innerHTML = tip + '<br>考生：' + name + ' | 得分：<span style="font-size:24px;">' + score + ' / 100</span> 分';
    btn.textContent = '已提交';
    document.getElementById('adminResetBtn').style.display = 'inline-block';
    resultBox.scrollIntoView({ behavior: 'smooth' });
}

window.onload = function() {
    if (!checkDeviceStatus()) {
        initQuiz();
        setupAntiCheat();
    }
};
</script>
